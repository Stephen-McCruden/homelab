# FILE PATH: clusters/homelab/infrastructure-controllers.yaml
# PURPOSE: Reconcile platform controllers before shared configuration
#          and applications.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./kubernetes/infrastructure/controllers
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
