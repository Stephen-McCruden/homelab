# FILE PATH: clusters/homelab/applications.yaml
# PURPOSE: Reconcile application workloads only after platform
#          configuration is healthy.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-configs

  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./kubernetes/applications/homelab
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
