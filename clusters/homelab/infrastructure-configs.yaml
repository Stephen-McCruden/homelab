# FILE PATH: clusters/homelab/infrastructure-configs.yaml
# PURPOSE: Reconcile shared configuration after infrastructure
#          controllers become healthy.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-controllers

  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./kubernetes/infrastructure/configs
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
