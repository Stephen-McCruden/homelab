---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-controllers

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./kubernetes/infrastructure/configs
  prune: true
  wait: true

  sourceRef:
    kind: GitRepository
    name: flux-system
