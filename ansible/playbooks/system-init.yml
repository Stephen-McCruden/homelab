# FILE PATH: playbooks/system-init.yml
---
- name: Reconcile controller SSH host keys for ephemeral Terraform nodes
  hosts: localhost
  gather_facts: false
  vars:
    known_hosts_file: "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
  tasks:
    - name: Reconcile known_hosts entries with currently provisioned nodes
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../scripts/reconcile-known-host.sh"
          - "{{ hostvars[item].ansible_host | default(item) }}"
          - "{{ known_hosts_file }}"
      loop: "{{ groups['kubernetes_cluster'] }}"
      loop_control:
        label: "{{ item }} -> {{ hostvars[item].ansible_host | default(item) }}"
      register: host_key_result
      changed_when: "'UPDATED:' in host_key_result.stdout"
      when: reconcile_ephemeral_ssh_host_keys | bool

- name: Prepare and harden Fedora Kubernetes nodes
  hosts: kubernetes_cluster
  become: true
  gather_facts: true
  any_errors_fatal: true
  serial: "100%"
  pre_tasks:
    - name: Validate supported environment
      ansible.builtin.assert:
        that:
          - ansible_distribution == 'Fedora'
          - ansible_version.full is version('2.16', '>=')
          - groups['kubernetes_control_plane'] | length >= 1
          - cluster_network_cidr is defined
          - management_network_cidrs | length >= 1
        fail_msg: Unsupported host, Ansible version, inventory, or required variables.
      tags: [always]
  roles:
    - role: package_manager
      tags: [packages]
    - role: prereqs
      tags: [prereqs]
    - role: container_runtime
      tags: [containerd]
    - role: kubernetes_node
      tags: [kubernetes]
    - role: firewall
      tags: [firewall]
    - role: hardening
      tags: [hardening]
    - role: verification
      tags: [verify, always]
