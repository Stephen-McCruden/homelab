# FILE PATH: playbooks/kube-reset.yml
---
- name: Kubernetes reset safety gate
  hosts: kubernetes_cluster
  gather_facts: false
  tasks:
    - name: Require explicit destructive confirmation
      ansible.builtin.assert:
        that: kubernetes_reset_confirm | default(false) | bool
        fail_msg: Set -e kubernetes_reset_confirm=true only after following the reset procedure.
