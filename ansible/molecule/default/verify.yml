# FILE PATH: molecule/default/verify.yml
---
- name: Verify Molecule node state
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Confirm swap is disabled
      ansible.builtin.command: swapon --noheadings --show
      register: molecule_swap
      changed_when: false
      failed_when: molecule_swap.stdout | trim | length > 0
    - name: Confirm Kubernetes tools are installed
      ansible.builtin.command: "{{ item }} --version"
      loop: [kubeadm, kubelet, kubectl]
      changed_when: false
    - name: Confirm containerd uses systemd cgroups
      ansible.builtin.command: grep -Eq '^\s*SystemdCgroup\s*=\s*true$' /etc/containerd/config.toml
      changed_when: false
