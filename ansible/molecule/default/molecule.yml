# FILE PATH: molecule/default/molecule.yml
---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: fedora-k8s-node
    image: quay.io/fedora/fedora:44
    command: /usr/sbin/init
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        ansible_user: root
        cluster_network_cidr: 172.18.0.0/16
        management_network_cidrs: [172.18.0.0/16]
        tailscale_management_cidrs: []
        kubernetes_minor_version: "1.36"
        reconcile_ephemeral_ssh_host_keys: false
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
