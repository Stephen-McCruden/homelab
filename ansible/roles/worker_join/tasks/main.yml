# FILE PATH: roles/worker_join/tasks/main.yml
# PURPOSE: Join Kubernetes worker nodes only when they are not already
#          initialized as cluster members.
---

- name: Check for worker kubelet kubeconfig
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: worker_join_kubelet_conf

- name: Check for worker kubelet configuration
  ansible.builtin.stat:
    path: /var/lib/kubelet/config.yaml
  register: worker_join_kubelet_config

- name: Validate existing worker join state
  ansible.builtin.assert:
    that:
      - >-
        worker_join_kubelet_conf.stat.exists
        ==
        worker_join_kubelet_config.stat.exists
    fail_msg: >-
      {{ inventory_hostname }} is in a partial kubeadm join state.
      kubelet.conf exists={{ worker_join_kubelet_conf.stat.exists }},
      config.yaml exists={{ worker_join_kubelet_config.stat.exists }}.
      Reset or rebuild this worker before continuing.

- name: Record effective worker join requirement
  ansible.builtin.set_fact:
    worker_join_required: >-
      {{ not worker_join_kubelet_conf.stat.exists }}

- name: Validate worker join credentials are available
  ansible.builtin.assert:
    that:
      - >-
        hostvars[groups['control_plane'][0]].worker_join_bootstrap_token
        is defined
      - >-
        hostvars[groups['control_plane'][0]].worker_join_ca_cert_hash
        is defined
      - kubeadm_config_control_plane_endpoint | length > 0
    fail_msg: >-
      Worker join credentials were not generated by the control-plane play.
  when: worker_join_required | bool

- name: Ensure Kubernetes configuration directory exists
  ansible.builtin.file:
    path: /etc/kubernetes
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render worker kubeadm JoinConfiguration
  ansible.builtin.template:
    src: kubeadm-join.yaml.j2
    dest: "{{ worker_join_config_path }}"
    owner: root
    group: root
    mode: "0600"
  when: worker_join_required | bool
  no_log: true

- name: Validate worker kubeadm JoinConfiguration
  ansible.builtin.command:
    argv:
      - kubeadm
      - config
      - validate
      - --config
      - "{{ worker_join_config_path }}"
  changed_when: false
  when: worker_join_required | bool
  no_log: true

- name: Join worker to Kubernetes cluster
  ansible.builtin.command:
    argv:
      - kubeadm
      - join
      - --config
      - "{{ worker_join_config_path }}"
  register: worker_join_result
  changed_when: worker_join_result.rc == 0
  when: worker_join_required | bool
  no_log: true

- name: Remove temporary worker JoinConfiguration
  ansible.builtin.file:
    path: "{{ worker_join_config_path }}"
    state: absent
  no_log: true

- name: Ensure kubelet is enabled and running
  ansible.builtin.systemd_service:
    name: kubelet
    enabled: true
    state: started
