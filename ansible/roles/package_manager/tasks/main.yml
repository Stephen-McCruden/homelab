# FILE PATH: roles/package_manager/tasks/main.yml
---
- name: Refresh DNF metadata with automatic cache recovery
  block:
    - name: Refresh DNF5 metadata
      ansible.builtin.command: dnf5 makecache --refresh
      register: dnf_makecache
      changed_when: false
      retries: "{{ package_manager_cache_retries }}"
      delay: "{{ package_manager_retry_delay }}"
      until: dnf_makecache.rc == 0
  rescue:
    - name: Remove damaged DNF5 cache
      ansible.builtin.command: dnf5 clean all
      changed_when: true
    - name: Rebuild DNF5 metadata after cleanup
      ansible.builtin.command: dnf5 makecache --refresh
      changed_when: true
