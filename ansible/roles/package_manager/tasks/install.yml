# FILE PATH: roles/package_manager/tasks/install.yml
# PURPOSE: Install packages safely on Fedora while recovering from bad cached RPM payloads.
---
- name: Validate requested package list
  ansible.builtin.assert:
    that:
      - package_manager_packages is defined
      - package_manager_packages | length > 0
    fail_msg: package_manager_packages must contain at least one package.

- name: Install requested packages
  block:
    - name: Install packages with DNF5
      ansible.builtin.dnf5:
        name: "{{ package_manager_packages }}"
        state: present
        update_cache: false
        disable_gpg_check: false
        disable_excludes: "{{ package_manager_disable_excludes | default(omit) }}"
      register: package_install
      throttle: 1

  rescue:
    - name: Capture failed package transaction details
      ansible.builtin.debug:
        msg: "{{ ansible_failed_result.msg | default('DNF5 transaction failed without a message') }}"

    - name: Stop any automatic DNF metadata work before recovery
      ansible.builtin.shell: |
        set -o pipefail
        systemctl stop dnf-makecache.timer dnf-makecache.service 2>/dev/null || true
        pkill -TERM -f '(^|/)(dnf|dnf5)([[:space:]]+[^[:space:]]+)*[[:space:]]+makecache([[:space:]]|$)' 2>/dev/null || true
        sleep 2
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove DNF5 cached packages and metadata after transaction failure
      ansible.builtin.file:
        path: /var/cache/libdnf5
        state: absent

    - name: Recreate DNF5 cache directory
      ansible.builtin.file:
        path: /var/cache/libdnf5
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Retry package transaction after cache recovery
      ansible.builtin.dnf5:
        name: "{{ package_manager_packages }}"
        state: present
        update_cache: true
        disable_gpg_check: false
        disable_excludes: "{{ package_manager_disable_excludes | default(omit) }}"
      register: package_install_retry
      retries: 2
      delay: 10
      until: package_install_retry is succeeded
      throttle: 1
