# FILE PATH: roles/container_runtime/tasks/main.yml
---
- name: Install containerd through resilient package management
  ansible.builtin.include_role:
    name: package_manager
    tasks_from: install
  vars:
    package_manager_packages: [containerd]

- name: Create containerd configuration directory
  ansible.builtin.file:
    path: "{{ containerd_config_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Read installed containerd version
  ansible.builtin.command:
    argv: [containerd, --version]
  register: containerd_installed_version
  changed_when: false
  check_mode: false

- name: Verify containerd 2.x is installed
  ansible.builtin.assert:
    that:
      - containerd_installed_version.stdout is search('containerd.*v?2\\.')
    fail_msg: "This role manages containerd 2.x. Detected: {{ containerd_installed_version.stdout }}"

- name: Install managed containerd 2.x configuration
  ansible.builtin.template:
    src: config-v3.toml.j2
    dest: "{{ containerd_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart containerd

- name: Flush containerd handler before validation
  ansible.builtin.meta: flush_handlers

- name: Enable and start containerd
  ansible.builtin.systemd_service:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true

- name: Read effective containerd configuration
  ansible.builtin.command:
    argv: [containerd, config, dump]
  register: containerd_effective_configuration
  changed_when: false
  check_mode: false

- name: Verify effective containerd systemd cgroup configuration
  ansible.builtin.assert:
    that:
      - containerd_effective_configuration.stdout is search('(?m)^\\s*SystemdCgroup\\s*=\\s*true\\s*$')
