# FILE PATH: roles/prereqs/tasks/main.yml
---
- name: Install Kubernetes prerequisite packages
  ansible.builtin.include_role:
    name: package_manager
    tasks_from: install
  vars:
    package_manager_packages: "{{ kubernetes_prerequisite_packages }}"

- name: Persist Kubernetes kernel modules
  ansible.builtin.template:
    src: kubernetes-modules.conf.j2
    dest: /etc/modules-load.d/kubernetes.conf
    owner: root
    group: root
    mode: "0644"

- name: Read loaded kernel modules
  ansible.builtin.command: lsmod
  register: loaded_kernel_modules
  changed_when: false
  check_mode: false

- name: Load missing required kernel modules
  ansible.builtin.command:
    argv: [modprobe, "{{ item }}"]
  loop: "{{ kubernetes_kernel_modules }}"
  when: loaded_kernel_modules.stdout is not regex('(?m)^' ~ item ~ '\\s')
  changed_when: true

- name: Install persistent Kubernetes sysctl configuration
  ansible.builtin.template:
    src: kubernetes-sysctl.conf.j2
    dest: /etc/sysctl.d/99-kubernetes.conf
    owner: root
    group: root
    mode: "0644"
  register: kubernetes_sysctl_configuration

- name: Apply Kubernetes sysctl configuration when changed
  ansible.builtin.command: sysctl --system
  when: kubernetes_sysctl_configuration.changed
  changed_when: true

- name: Disable zram generation for Kubernetes nodes
  ansible.builtin.copy:
    content: |
      # Managed by Ansible.
      [zram0]
      zram-size = 0
    dest: /etc/systemd/zram-generator.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Stop generated zram swap unit when present
  ansible.builtin.systemd_service:
    name: systemd-zram-setup@zram0.service
    state: stopped
  failed_when: false

- name: Reset failed zram systemd state
  ansible.builtin.command:
    argv: [systemctl, reset-failed, systemd-zram-setup@zram0.service]
  changed_when: false
  failed_when: false

- name: Disable persistent swap entries
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(?!#)(\S+\s+\S+\s+swap\s+\S+.*)$'
    replace: '# Disabled by Ansible for Kubernetes: \1'

- name: Read active swap
  ansible.builtin.command: swapon --noheadings --show
  register: active_swap
  changed_when: false
  check_mode: false

- name: Disable active swap
  ansible.builtin.command: swapoff --all
  when: active_swap.stdout | trim | length > 0
  changed_when: true
