# FILE PATH: roles/prereqs/tasks/verify.yml
# PURPOSE: Keep this file at exactly this path inside the Ansible project.
---
- name: Read active swap devices for verification
  ansible.builtin.command: swapon --noheadings --show
  register: verify_active_swap
  changed_when: false
  check_mode: false

- name: Read loaded kernel modules for verification
  ansible.builtin.command: lsmod
  register: verify_loaded_modules
  changed_when: false
  check_mode: false

- name: Read effective sysctl values
  ansible.builtin.command: "sysctl -n {{ item.key }}"
  loop: "{{ kubernetes_sysctl_settings | dict2items }}"
  register: verify_effective_sysctls
  changed_when: false
  check_mode: false

- name: Read effective containerd configuration
  ansible.builtin.command: containerd config dump
  register: verify_containerd_dump
  changed_when: false
  check_mode: false

- name: Read service facts
  ansible.builtin.service_facts:

- name: Query installed Kubernetes packages
  ansible.builtin.command: "rpm -q {{ kubernetes_node_packages | join(' ') }}"
  register: verify_kubernetes_packages
  changed_when: false
  check_mode: false

- name: Assert Kubernetes prerequisite state
  ansible.builtin.assert:
    that:
      - verify_active_swap.stdout | trim == ''
      - "'overlay' in verify_loaded_modules.stdout"
      - "'br_netfilter' in verify_loaded_modules.stdout"
      - verify_effective_sysctls.results | map(attribute='stdout') | list == (kubernetes_sysctl_settings | dict2items | map(attribute='value') | list)
      - "'SystemdCgroup = true' in verify_containerd_dump.stdout"
      - "'cri' not in (verify_containerd_dump.stdout | regex_search('disabled_plugins = \\[[^]]*\\]') | default(''))"
      - ansible_facts.services[containerd_service_name + '.service'].state == 'running'
      - ansible_facts.services[containerd_service_name + '.service'].status == 'enabled'
      - verify_kubernetes_packages.rc == 0
    fail_msg: "Kubernetes host prerequisite verification failed on {{ inventory_hostname }}."
    success_msg: "Kubernetes host prerequisites verified on {{ inventory_hostname }}."
