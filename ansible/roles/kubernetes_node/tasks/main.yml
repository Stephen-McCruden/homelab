# FILE PATH: roles/kubernetes_node/tasks/main.yml
---
- name: Configure versioned Kubernetes repository
  ansible.builtin.template:
    src: kubernetes.repo.j2
    dest: /etc/yum.repos.d/kubernetes.repo
    owner: root
    group: root
    mode: "0644"
  register: kubernetes_repository

- name: Refresh DNF5 metadata after repository changes
  ansible.builtin.command:
    argv: [dnf5, makecache, --refresh]
  when: kubernetes_repository.changed
  changed_when: true

- name: Install Kubernetes node packages through resilient package management
  ansible.builtin.include_role:
    name: package_manager
    tasks_from: install
  vars:
    package_manager_packages: "{{ kubernetes_packages }}"

- name: Enable kubelet for later cluster bootstrap
  ansible.builtin.systemd_service:
    name: kubelet
    enabled: true
