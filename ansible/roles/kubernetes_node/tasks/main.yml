# FILE PATH: roles/kubernetes_node/tasks/main.yml
---
- name: Configure versioned Kubernetes repository
  ansible.builtin.template:
    src: kubernetes.repo.j2
    dest: /etc/yum.repos.d/kubernetes.repo
    owner: root
    group: root
    mode: "0644"

- name: Install Kubernetes node packages through shared package management
  ansible.builtin.include_role:
    name: package_manager
    tasks_from: install
  vars:
    package_manager_packages: "{{ kubernetes_node_packages }}"
    package_manager_disable_excludes: kubernetes

- name: Enable kubelet for later cluster bootstrap
  ansible.builtin.systemd_service:
    name: kubelet
    enabled: true
