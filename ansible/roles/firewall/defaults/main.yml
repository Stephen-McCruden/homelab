# FILE PATH: roles/firewall/defaults/main.yml
# PURPOSE: Default firewalld configuration for Kubernetes nodes.
---

firewall_kubernetes_zone: kubernetes
firewall_external_zone: public
firewall_kubernetes_egress_policy: kubernetes-egress

# Networks permitted to reach Kubernetes node services.
#
# The management and node-network CIDRs are supplied by inventory.
# Cilium currently allocates Pod addresses from 10.0.x.x, so Pod-originated
# traffic must also be associated with the restricted Kubernetes zone.
firewall_pod_network_cidrs:
  - 10.0.0.0/16

# Permit forwarding for traffic associated with the Kubernetes zone.
firewall_kubernetes_forward_enabled: true

# Permit Pod-network traffic to leave through the node's external zone.
firewall_kubernetes_egress_enabled: true

firewall_control_plane_ports:
  - 6443/tcp
  - 2379-2380/tcp
  - 7946/tcp
  - 7946/udp
  - 9100/tcp
  - 10250/tcp
  - 10257/tcp
  - 10259/tcp

firewall_worker_ports:
  - 7946/tcp
  - 7946/udp
  - 9100/tcp
  - 10250/tcp
  - 10256/tcp

firewall_nodeport_range: 30000-32767/tcp
