# FILE PATH: roles/firewall/tasks/main.yml
---
- name: Install firewalld through shared package management
  ansible.builtin.include_role:
    name: package_manager
    tasks_from: install
  vars:
    package_manager_packages: [firewalld]

- name: Enable and start firewalld
  ansible.builtin.systemd_service:
    name: firewalld
    enabled: true
    state: started

- name: Read permanent firewalld zones
  ansible.builtin.command: firewall-cmd --permanent --get-zones
  register: firewalld_zones
  changed_when: false

- name: Create source-restricted Kubernetes zone
  ansible.builtin.command: "firewall-cmd --permanent --new-zone={{ kubernetes_firewall_zone }}"
  when: kubernetes_firewall_zone not in firewalld_zones.stdout.split()
  register: zone_created
  changed_when: true

- name: Reload firewalld after zone creation
  ansible.builtin.command: firewall-cmd --reload
  when: zone_created.changed | default(false)
  changed_when: true

- name: Build allowed source list
  ansible.builtin.set_fact:
    kubernetes_allowed_sources: "{{ (management_network_cidrs + tailscale_management_cidrs + [cluster_network_cidr]) | unique }}"

- name: Query configured zone sources
  ansible.builtin.command: "firewall-cmd --permanent --zone={{ kubernetes_firewall_zone }} --query-source={{ item }}"
  loop: "{{ kubernetes_allowed_sources }}"
  register: source_queries
  changed_when: false
  failed_when: source_queries.rc not in [0, 1]

- name: Add missing management and cluster sources
  ansible.builtin.command: "firewall-cmd --permanent --zone={{ kubernetes_firewall_zone }} --add-source={{ item.item }}"
  loop: "{{ source_queries.results }}"
  when: item.rc == 1
  register: sources_added
  changed_when: true

- name: Query SSH service in restricted zone
  ansible.builtin.command: "firewall-cmd --permanent --zone={{ kubernetes_firewall_zone }} --query-service=ssh"
  register: ssh_query
  changed_when: false
  failed_when: ssh_query.rc not in [0, 1]

- name: Permit SSH in restricted zone
  ansible.builtin.command: "firewall-cmd --permanent --zone={{ kubernetes_firewall_zone }} --add-service=ssh"
  when: ssh_query.rc == 1
  register: ssh_added
  changed_when: true

- name: Build required Kubernetes port list for this host
  ansible.builtin.set_fact:
    required_kubernetes_ports: >-
      {{ (control_plane_ports if inventory_hostname in groups['control_plane'] else worker_ports)
         + ([nodeport_range] if firewall_allow_nodeport_range | bool else []) }}

- name: Query required Kubernetes ports
  ansible.builtin.command: "firewall-cmd --permanent --zone={{ kubernetes_firewall_zone }} --query-port={{ item }}"
  loop: "{{ required_kubernetes_ports }}"
  register: port_queries
  changed_when: false
  failed_when: port_queries.rc not in [0, 1]

- name: Add missing Kubernetes ports
  ansible.builtin.command: "firewall-cmd --permanent --zone={{ kubernetes_firewall_zone }} --add-port={{ item.item }}"
  loop: "{{ port_queries.results }}"
  when: item.rc == 1
  register: ports_added
  changed_when: true

- name: Reload firewalld when permanent configuration changed
  ansible.builtin.command: firewall-cmd --reload
  when: >-
    (sources_added.changed | default(false)) or
    (ssh_added.changed | default(false)) or
    (ports_added.changed | default(false))
  changed_when: true
