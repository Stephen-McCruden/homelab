# FILE PATH: roles/verification/tasks/main.yml
---
- name: Flush pending handlers before validation
  ansible.builtin.meta: flush_handlers

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Verify required services are present and active
  ansible.builtin.assert:
    that:
      - item in ansible_facts.services
      - ansible_facts.services[item].state == "running"
  loop:
    - containerd.service
    - firewalld.service

- name: Check active swap
  ansible.builtin.command:
    argv:
      - swapon
      - --noheadings
      - --show
  register: verification_swap
  changed_when: false
  failed_when: verification_swap.stdout | trim | length > 0

- name: Check required sysctl values
  ansible.builtin.command:
    argv:
      - sysctl
      - -n
      - "{{ item.key }}"
  loop: "{{ kubernetes_sysctl_values | dict2items }}"
  register: verification_sysctl
  changed_when: false
  failed_when: >
    verification_sysctl.rc != 0 or
    verification_sysctl.stdout | trim != item.value | string

- name: Read active SELinux mode
  ansible.builtin.command:
    argv:
      - getenforce
  register: verification_selinux
  changed_when: false

- name: Verify configured SELinux mode
  ansible.builtin.assert:
    that:
      - >
        (
          hardening_selinux_state == 'permissive'
          and verification_selinux.stdout == 'Permissive'
        )
        or
        (
          hardening_selinux_state == 'enforcing'
          and verification_selinux.stdout == 'Enforcing'
        )
    fail_msg: >-
      SELinux is {{ verification_selinux.stdout }},
      expected {{ hardening_selinux_state }}.

- name: Read effective SSH configuration
  ansible.builtin.command:
    argv:
      - sshd
      - -T
  register: verification_sshd
  changed_when: false

- name: Verify effective SSH hardening settings
  ansible.builtin.assert:
    that:
      - "'permitrootlogin no' in verification_sshd.stdout"
      - "'passwordauthentication no' in verification_sshd.stdout"
      - "'kbdinteractiveauthentication no' in verification_sshd.stdout"
      - "'pubkeyauthentication yes' in verification_sshd.stdout"

- name: Verify kubeadm is installed and executable
  ansible.builtin.command:
    argv:
      - kubeadm
      - version
      - -o
      - short
  register: verification_kubeadm
  changed_when: false

- name: Verify kubelet is installed and executable
  ansible.builtin.command:
    argv:
      - kubelet
      - --version
  register: verification_kubelet
  changed_when: false

- name: Verify kubectl is installed and executable
  ansible.builtin.command:
    argv:
      - kubectl
      - version
      - --client=true
      - --output=yaml
  register: verification_kubectl
  changed_when: false

- name: Verify OCI runtime is installed and executable
  ansible.builtin.command:
    argv:
      - runc
      - --version
  register: verification_runc_version
  changed_when: false
  check_mode: false

- name: Verify CRI troubleshooting client is installed
  ansible.builtin.command:
    argv:
      - crictl
      - --version
  register: verification_crictl_version
  changed_when: false
  check_mode: false

- name: Read effective containerd configuration
  ansible.builtin.command:
    argv:
      - containerd
      - config
      - dump
  register: verification_containerd
  changed_when: false

- name: Verify containerd uses systemd cgroups
  ansible.builtin.assert:
    that:
      - verification_containerd.stdout is search('(?m)^\\s*SystemdCgroup\\s*=\\s*true\\s*$')

- name: Report verified Kubernetes component versions
  ansible.builtin.debug:
    msg:
      - "kubeadm: {{ verification_kubeadm.stdout | trim }}"
      - "kubelet: {{ verification_kubelet.stdout | trim }}"
      - "kubectl client verification completed successfully"
