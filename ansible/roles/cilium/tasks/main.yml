# FILE PATH: roles/cilium/tasks/main.yml
# PURPOSE: Install a pinned Cilium release and verify its Kubernetes
#          workloads using native rollout checks.
---

- name: Validate Cilium installation variables
  ansible.builtin.assert:
    that:
      - cilium_version | length > 0
      - cilium_cli_version is match('^v[0-9]+\.[0-9]+\.[0-9]+$')
      - cilium_cli_architecture in ['amd64', 'arm64']
      - cilium_operator_replicas | int > 0
      - cilium_kubeconfig_path | length > 0
    fail_msg: >-
      One or more Cilium installation variables are invalid.

- name: Check whether Cilium CLI is installed
  ansible.builtin.stat:
    path: "{{ cilium_cli_install_path }}"
  register: cilium_cli_binary

- name: Ensure Cilium CLI download directory exists
  ansible.builtin.file:
    path: "{{ cilium_cli_download_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not cilium_cli_binary.stat.exists

- name: Download Cilium CLI archive
  ansible.builtin.get_url:
    url: "{{ cilium_cli_download_url }}"
    dest: >-
      {{ cilium_cli_download_directory }}/{{ cilium_cli_archive }}
    owner: root
    group: root
    mode: "0644"
  when: not cilium_cli_binary.stat.exists

- name: Download Cilium CLI checksum
  ansible.builtin.get_url:
    url: "{{ cilium_cli_checksum_url }}"
    dest: >-
      {{ cilium_cli_download_directory }}/{{ cilium_cli_archive }}.sha256sum
    owner: root
    group: root
    mode: "0644"
  when: not cilium_cli_binary.stat.exists

- name: Verify Cilium CLI archive checksum
  ansible.builtin.command:
    argv:
      - sha256sum
      - --check
      - "{{ cilium_cli_archive }}.sha256sum"
    chdir: "{{ cilium_cli_download_directory }}"
  changed_when: false
  when: not cilium_cli_binary.stat.exists

- name: Extract Cilium CLI
  ansible.builtin.unarchive:
    src: >-
      {{ cilium_cli_download_directory }}/{{ cilium_cli_archive }}
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when: not cilium_cli_binary.stat.exists

- name: Verify Cilium CLI is executable
  ansible.builtin.command:
    argv:
      - "{{ cilium_cli_install_path }}"
      - version
      - --client
  register: cilium_cli_version_result
  changed_when: false

- name: Check whether Cilium is already installed
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --namespace
      - kube-system
      - get
      - daemonset
      - cilium
      - --output
      - name
  register: cilium_existing_installation
  changed_when: false
  failed_when: false

- name: Install Cilium
  ansible.builtin.command:
    argv:
      - "{{ cilium_cli_install_path }}"
      - install
      - --version
      - "{{ cilium_version }}"
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --set
      - "operator.replicas={{ cilium_operator_replicas }}"
  register: cilium_install_result
  changed_when: cilium_install_result.rc == 0
  when: cilium_existing_installation.rc != 0

- name: Wait for Cilium agent DaemonSet rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --namespace
      - kube-system
      - rollout
      - status
      - daemonset/cilium
      - --timeout=30s
  register: cilium_agent_rollout
  changed_when: false
  retries: 10
  delay: 5
  until: cilium_agent_rollout.rc == 0

- name: Wait for Cilium Envoy DaemonSet rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --namespace
      - kube-system
      - rollout
      - status
      - daemonset/cilium-envoy
      - --timeout=30s
  register: cilium_envoy_rollout
  changed_when: false
  retries: 10
  delay: 5
  until: cilium_envoy_rollout.rc == 0

- name: Wait for Cilium operator Deployment rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --namespace
      - kube-system
      - rollout
      - status
      - deployment/cilium-operator
      - --timeout=30s
  register: cilium_operator_rollout
  changed_when: false
  retries: 10
  delay: 5
  until: cilium_operator_rollout.rc == 0

- name: Read Cilium agent DaemonSet status
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --namespace
      - kube-system
      - get
      - daemonset
      - cilium
      - --output
      - jsonpath={.status.numberReady}/{.status.desiredNumberScheduled}
  register: cilium_agent_ready_count
  changed_when: false

- name: Read Cilium Envoy DaemonSet status
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --namespace
      - kube-system
      - get
      - daemonset
      - cilium-envoy
      - --output
      - jsonpath={.status.numberReady}/{.status.desiredNumberScheduled}
  register: cilium_envoy_ready_count
  changed_when: false

- name: Read Cilium operator Deployment status
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ cilium_kubeconfig_path }}"
      - --namespace
      - kube-system
      - get
      - deployment
      - cilium-operator
      - --output
      - jsonpath={.status.readyReplicas}/{.status.replicas}
  register: cilium_operator_ready_count
  changed_when: false

- name: Report Cilium workload readiness
  ansible.builtin.debug:
    msg:
      - >-
        Cilium agents ready:
        {{ cilium_agent_ready_count.stdout }}
      - >-
        Cilium Envoy ready:
        {{ cilium_envoy_ready_count.stdout }}
      - >-
        Cilium operators ready:
        {{ cilium_operator_ready_count.stdout }}
