# FILE PATH: roles/hardening/tasks/main.yml
---
- name: Read current SELinux mode
  ansible.builtin.command: getenforce
  register: selinux_mode
  changed_when: false

- name: Set SELinux enforcing immediately
  ansible.builtin.command: setenforce 1
  when: selinux_mode.stdout != 'Enforcing'
  changed_when: true

- name: Persist SELinux enforcing mode
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: SELINUX=enforcing

- name: Verify administrative authorized_keys exists before disabling passwords
  ansible.builtin.stat:
    path: "/home/{{ ansible_user }}/.ssh/authorized_keys"
  register: administrative_authorized_keys

- name: Assert administrative SSH key is present
  ansible.builtin.assert:
    that:
      - administrative_authorized_keys.stat.exists
      - administrative_authorized_keys.stat.size > 0

- name: Install SSH hardening drop-in
  ansible.builtin.template:
    src: 20-ansible-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/20-ansible-hardening.conf
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd
  when: ssh_hardening_enabled | bool
