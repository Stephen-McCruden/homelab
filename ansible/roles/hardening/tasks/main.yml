# FILE PATH: roles/hardening/tasks/main.yml
---
- name: Read current SELinux mode
  ansible.builtin.command: getenforce
  register: selinux_mode
  changed_when: false

- name: Set SELinux enforcing immediately
  ansible.builtin.command: setenforce 1
  when: selinux_mode.stdout | trim != 'Enforcing'
  changed_when: true

- name: Persist SELinux enforcing mode
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: SELINUX=enforcing
    backup: true

- name: Verify administrative authorized_keys exists before disabling passwords
  ansible.builtin.stat:
    path: "/home/{{ ssh_authorized_key_user }}/.ssh/authorized_keys"
  register: admin_authorized_keys

- name: Assert administrative SSH key is present
  ansible.builtin.assert:
    that:
      - admin_authorized_keys.stat.exists
      - admin_authorized_keys.stat.size | int > 0
    fail_msg: Refusing to disable password SSH because authorized_keys is absent or empty.

- name: Install SSH hardening drop-in
  ansible.builtin.copy:
    dest: "{{ ssh_hardening_dropin }}"
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
    content: |
      # Managed by Ansible
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      MaxAuthTries 3
      LoginGraceTime 30
      X11Forwarding no
      AllowTcpForwarding yes
      ClientAliveInterval 300
      ClientAliveCountMax 2
  notify: Restart sshd
