# FILE PATH: roles/hardening/tasks/main.yml
# PURPOSE: Configure SELinux compatibility and securely harden SSH access.
---

- name: Validate requested SELinux state
  ansible.builtin.assert:
    that:
      - hardening_selinux_state in ['enforcing', 'permissive']
    fail_msg: >-
      hardening_selinux_state must be either enforcing or permissive.

- name: Persist configured SELinux mode
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: "SELINUX={{ hardening_selinux_state }}"
    owner: root
    group: root
    mode: "0644"

- name: Read current SELinux enforcement mode
  ansible.builtin.command:
    argv:
      - getenforce
  register: hardening_selinux_mode
  changed_when: false
  check_mode: false

- name: Set SELinux to permissive immediately
  ansible.builtin.command:
    argv:
      - setenforce
      - "0"
  when:
    - hardening_selinux_state == 'permissive'
    - hardening_selinux_mode.stdout == 'Enforcing'
  changed_when: true

- name: Set SELinux to enforcing immediately
  ansible.builtin.command:
    argv:
      - setenforce
      - "1"
  when:
    - hardening_selinux_state == 'enforcing'
    - hardening_selinux_mode.stdout != 'Enforcing'
  changed_when: true

- name: Read resulting SELinux enforcement mode
  ansible.builtin.command:
    argv:
      - getenforce
  register: hardening_selinux_result
  changed_when: false
  check_mode: false

- name: Verify configured SELinux mode is active
  ansible.builtin.assert:
    that:
      - >-
        (
          hardening_selinux_state == 'permissive'
          and hardening_selinux_result.stdout == 'Permissive'
        )
        or
        (
          hardening_selinux_state == 'enforcing'
          and hardening_selinux_result.stdout == 'Enforcing'
        )
    fail_msg: >-
      SELinux did not enter the requested {{ hardening_selinux_state }} mode.
      Current mode is {{ hardening_selinux_result.stdout }}.

- name: Verify administrative authorized_keys exists before disabling passwords
  ansible.builtin.stat:
    path: "{{ hardening_admin_home }}/.ssh/authorized_keys"
  register: hardening_administrative_authorized_keys
  when: hardening_ssh_enabled | bool

- name: Assert administrative SSH key is present
  ansible.builtin.assert:
    that:
      - hardening_administrative_authorized_keys.stat.exists
      - hardening_administrative_authorized_keys.stat.isreg
      - hardening_administrative_authorized_keys.stat.size > 0
    fail_msg: >-
      A valid authorized_keys file must exist at
      {{ hardening_admin_home }}/.ssh/authorized_keys before password
      authentication can be disabled.
  when: hardening_ssh_enabled | bool

- name: Ensure SSH drop-in configuration directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: hardening_ssh_enabled | bool

- name: Install SSH hardening drop-in
  ansible.builtin.template:
    src: 20-ansible-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/20-ansible-hardening.conf
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd
  when: hardening_ssh_enabled | bool
