# FILE PATH: inventory/hosts.yml
# PURPOSE: Keep this file at exactly this path inside the Ansible project.
---
all:
  vars:
    ansible_user: stoof
    ansible_ssh_private_key_file: ~/.ssh/id_rsa

    # Terraform-created VMs reuse these addresses. The localhost preflight in
    # system-init.yml replaces a known_hosts entry only when the live host key
    # differs, allowing destroy/apply/rebuild cycles without manual ssh-keygen.
    reconcile_ephemeral_ssh_host_keys: true

    # LAN containing the Kubernetes node addresses.
    cluster_network_cidr: 192.168.0.0/24

    # Networks permitted to administer the hosts over SSH. With Tailscale's
    # default subnet-router SNAT, the VM sees the subnet router's LAN address,
    # so the LAN CIDR below is sufficient.
    management_network_cidrs:
      - 192.168.0.0/24

    # Only populate this when subnet-route SNAT is disabled. Prefer your
    # laptop's exact Tailscale /32, for example 100.80.90.100/32, rather than
    # allowing the entire 100.64.0.0/10 range.
    tailscale_management_cidrs: []

    kubernetes_minor_version: "1.36"

  children:
    control_plane:
      hosts:
        k8s-master-01:
          ansible_host: 192.168.0.52
    workers:
      hosts:
        k8s-worker-01:
          ansible_host: 192.168.0.50
        k8s-worker-02:
          ansible_host: 192.168.0.51
