# FILE PATH:
# kubernetes/infrastructure/controllers/metrics-server/helmrelease.yaml
# PURPOSE: Deploy and continuously reconcile Metrics Server.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 30m
  timeout: 10m

  chart:
    spec:
      chart: metrics-server
      version: "3.13.0"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
      interval: 1h

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true

  rollback:
    timeout: 5m
    cleanupOnFail: true

  values:
    replicas: 2

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    args:
      - --kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP
      - --metric-resolution=15s

    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 250Mi

    serviceMonitor:
      enabled: false
