# FILE PATH:
# kubernetes/infrastructure/controllers/kubelet-csr-approver/helmrelease.yaml
# PURPOSE: Validate and approve legitimate kubelet-serving CSRs.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
  namespace: kube-system
spec:
  interval: 30m
  timeout: 5m

  chart:
    spec:
      chart: kubelet-csr-approver
      version: "1.2.14"
      sourceRef:
        kind: HelmRepository
        name: kubelet-csr-approver
        namespace: flux-system
      interval: 1h

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true

  rollback:
    timeout: 5m
    cleanupOnFail: true

  values:
    replicas: 2
    leaderElection: true

    providerRegex: >-
      ^k8s-(master|worker)-0[1-2]$

    providerIpPrefixes:
      - 192.168.0.0/24

    bypassDnsResolution: true
    bypassHostnameCheck: false

    allowedDnsNames: 1

    ignoreNonSystemNode: true
    skipDenyStep: true

    maxExpirationSeconds: "31536000"

    loggingLevel: 0

    metrics:
      enable: true

    serviceMonitor:
      enabled: false

    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 96Mi
