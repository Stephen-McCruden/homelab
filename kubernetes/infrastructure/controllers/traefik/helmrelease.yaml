# FILE PATH:
# kubernetes/infrastructure/controllers/traefik/helmrelease.yaml
# PURPOSE: Deploy Traefik as the cluster ingress controller with a fixed
#          MetalLB address and Prometheus monitoring.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik

spec:
  interval: 30m
  timeout: 10m

  chart:
    spec:
      chart: traefik
      version: "41.0.2"

      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system

      interval: 1h

  install:
    crds: CreateReplace

    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace

    remediation:
      retries: 3
      remediateLastFailure: true

  rollback:
    timeout: 5m
    cleanupOnFail: true

  values:
    deployment:
      kind: Deployment
      replicas: 2

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: false
        allowExternalNameServices: false
        allowEmptyServices: true

      kubernetesIngress:
        enabled: true
        allowExternalNameServices: false
        allowEmptyServices: true

        publishedService:
          enabled: true

      kubernetesGateway:
        enabled: false

    gateway:
      enabled: false

    gatewayClass:
      enabled: false

    api:
      dashboard: false
      insecure: false

    ingressRoute:
      dashboard:
        enabled: false

    service:
      enabled: true

      annotations:
        metallb.io/address-pool: homelab-lan

      spec:
        type: LoadBalancer
        loadBalancerIP: 192.168.0.220
        externalTrafficPolicy: Cluster

    ports:
      web:
        port: 8000

        expose:
          default: true

        exposedPort: 80
        protocol: TCP

      websecure:
        port: 8443

        expose:
          default: true

        exposedPort: 443
        protocol: TCP

      metrics:
        port: 9100

        expose:
          default: false

        exposedPort: 9100
        protocol: TCP

    metrics:
      prometheus:
        entryPoint: metrics

        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true

        service:
          enabled: true

        serviceMonitor:
          enabled: true
          interval: 30s
          namespace: monitoring

    log:
      level: INFO
      format: json

    accessLog:
      enabled: true
      format: json

      fields:
        defaultMode: keep

        headers:
          defaultMode: drop

    resources:
      requests:
        cpu: 100m
        memory: 128Mi

      limits:
        cpu: 500m
        memory: 512Mi
