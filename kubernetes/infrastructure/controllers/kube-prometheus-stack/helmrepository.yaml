# FILE PATH:
# kubernetes/infrastructure/controllers/kube-prometheus-stack/helmrepository.yaml
# PURPOSE: Register the official Prometheus Community Helm repository.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
