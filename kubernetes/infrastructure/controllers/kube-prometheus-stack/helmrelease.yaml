# FILE PATH:
# kubernetes/infrastructure/controllers/kube-prometheus-stack/helmrelease.yaml
# PURPOSE: Deploy Prometheus Operator, Prometheus, Alertmanager,
#          kube-state-metrics, and node-exporter through Flux.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 15m

  chart:
    spec:
      chart: kube-prometheus-stack
      version: "85.4.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true

  rollback:
    timeout: 10m
    cleanupOnFail: true

  values:
    fullnameOverride: kube-prometheus-stack

    # Grafana is deployed later as a standalone application so that its
    # Azure-backed administrator Secret exists before Helm installs it.
    grafana:
      enabled: false

    prometheus:
      enabled: true

      service:
        type: ClusterIP

      prometheusSpec:
        replicas: 1

        retention: 7d
        retentionSize: 8GB

        enableAdminAPI: false
        logLevel: info

        resources:
          requests:
            cpu: 300m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi

        # Allow ServiceMonitors, PodMonitors, PrometheusRules,
        # and Probes from every namespace without requiring
        # Helm release-specific labels.
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}

        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}

        ruleSelectorNilUsesHelmValues: false
        ruleSelector: {}
        ruleNamespaceSelector: {}

        probeSelectorNilUsesHelmValues: false
        probeSelector: {}
        probeNamespaceSelector: {}

        # Intentionally ephemeral until Longhorn is installed.
        storageSpec: {}

    alertmanager:
      enabled: true

      service:
        type: ClusterIP

      alertmanagerSpec:
        replicas: 1

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 512Mi

        # Intentionally ephemeral until Longhorn is installed.
        storage: {}

    kube-state-metrics:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

    prometheus-node-exporter:
      hostNetwork: true
      hostPID: true

      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 192Mi
