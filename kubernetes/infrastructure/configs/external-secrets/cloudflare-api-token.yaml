# FILE PATH:
# kubernetes/infrastructure/configs/external-secrets/cloudflare-api-token.yaml
# PURPOSE: Synchronize the Cloudflare API token into cert-manager.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-key-vault

  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    deletionPolicy: Retain

    template:
      type: Opaque

  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare-api-token
