# FILE PATH:
# kubernetes/infrastructure/configs/external-secrets/grafana-admin-credentials.yaml
# PURPOSE: Synchronize Grafana administrator credentials into monitoring.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-key-vault

  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
    deletionPolicy: Retain

    template:
      type: Opaque

  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana-admin-user

    - secretKey: admin-password
      remoteRef:
        key: grafana-admin-password
