# FILE PATH:
# kubernetes/infrastructure/configs/cert-manager/certificate-test.yaml
# PURPOSE: Validate Let's Encrypt DNS-01 issuance through Cloudflare.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls-test-mccruden-com
  namespace: cert-manager
spec:
  secretName: tls-test-mccruden-com

  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-staging

  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always

  dnsNames:
    - tls-test.mccruden.com
