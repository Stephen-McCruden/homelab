# FILE PATH:
# kubernetes/infrastructure/configs/cert-manager/clusterissuer-staging.yaml
# PURPOSE: Configure Let's Encrypt staging with Cloudflare DNS-01.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: stephen@mccruden.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory

    privateKeySecretRef:
      name: letsencrypt-staging-account-key

    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
